<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小牛位置 - 全自动智能求解器</title>
    <style>
        :root {
            --bg: #eef3f0;
            --surface: #ffffff;
            --surface-soft: #f7faf8;
            --text: #17201a;
            --muted: #647067;
            --line: #dce5df;
            --accent: #2f8f63;
            --accent-dark: #23724e;
            --accent-soft: #e3f4ec;
            --gold: #f1b84b;
            --shadow: 0 20px 60px rgba(21, 49, 35, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 32px 18px;
            color: var(--text);
            font-family: "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(241, 184, 75, 0.2), transparent 34%),
                linear-gradient(135deg, #eef3f0 0%, #f8fbf5 52%, #e5f1ed 100%);
        }

        .app {
            width: min(960px, 100%);
            margin: 0 auto;
        }

        .hero {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0;
            font-size: clamp(28px, 5vw, 46px);
            line-height: 1.1;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 15px;
        }

        .badge {
            flex: 0 0 auto;
            padding: 9px 14px;
            border: 1px solid rgba(47, 143, 99, 0.24);
            border-radius: 999px;
            color: var(--accent-dark);
            background: rgba(255, 255, 255, 0.72);
            font-size: 13px;
            font-weight: 700;
        }

        .tool {
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.86);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .top-panel {
            display: grid;
            grid-template-columns: minmax(0, 1.25fr) minmax(260px, 0.75fr);
            gap: 0;
            border-bottom: 1px solid var(--line);
        }

        .upload-area {
            min-height: 238px;
            display: grid;
            place-items: center;
            padding: 28px;
            border: 0;
            border-right: 1px solid var(--line);
            color: var(--muted);
            text-align: center;
            cursor: pointer;
            background:
                linear-gradient(135deg, rgba(47, 143, 99, 0.08), rgba(241, 184, 75, 0.08)),
                var(--surface-soft);
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }

        .upload-area:hover,
        .upload-area.dragging {
            color: var(--accent-dark);
            background:
                linear-gradient(135deg, rgba(47, 143, 99, 0.16), rgba(241, 184, 75, 0.14)),
                #fbfdfb;
        }

        .upload-mark {
            width: 72px;
            height: 72px;
            display: grid;
            place-items: center;
            margin: 0 auto 14px;
            border-radius: 22px;
            background: var(--surface);
            box-shadow: 0 12px 28px rgba(47, 143, 99, 0.14);
            font-size: 34px;
        }

        .upload-title {
            margin: 0;
            color: var(--text);
            font-size: 20px;
            font-weight: 800;
        }

        .upload-hint {
            margin: 8px 0 0;
            font-size: 14px;
        }

        .paste-panel {
            display: grid;
            gap: 14px;
            padding: 18px 28px 28px;
            border-top: 1px solid var(--line);
            background: linear-gradient(135deg, rgba(47, 143, 99, 0.04), rgba(241, 184, 75, 0.05));
        }

        .paste-area {
            display: grid;
            place-items: center;
            min-height: 132px;
            padding: 20px;
            border: 1px dashed #b9cabf;
            border-radius: 14px;
            color: var(--muted);
            text-align: center;
            cursor: text;
            background: rgba(255, 255, 255, 0.72);
            transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
        }

        .paste-area:hover,
        .paste-area:focus,
        .paste-area.active {
            border-color: rgba(47, 143, 99, 0.5);
            color: var(--accent-dark);
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(47, 143, 99, 0.08);
        }

        .paste-mark {
            width: 60px;
            height: 60px;
            display: grid;
            place-items: center;
            margin: 0 auto 12px;
            border-radius: 18px;
            background: var(--surface-soft);
            color: var(--accent-dark);
            box-shadow: 0 10px 24px rgba(47, 143, 99, 0.12);
            font-size: 24px;
            font-weight: 900;
        }

        .paste-title {
            margin: 0;
            color: var(--text);
            font-size: 18px;
            font-weight: 800;
        }

        .paste-hint {
            margin: 8px 0 0;
            font-size: 13px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 16px;
            padding: 28px;
            background: var(--surface);
        }

        .number-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        label {
            display: grid;
            gap: 7px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        input {
            width: 100%;
            min-height: 44px;
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            color: var(--text);
            background: var(--surface-soft);
            font-size: 16px;
            font-weight: 800;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: rgba(47, 143, 99, 0.75);
            box-shadow: 0 0 0 4px rgba(47, 143, 99, 0.12);
        }

        button {
            min-height: 48px;
            padding: 0 18px;
            border: none;
            border-radius: 12px;
            color: #ffffff;
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            cursor: pointer;
            font-size: 15px;
            font-weight: 800;
            box-shadow: 0 14px 30px rgba(47, 143, 99, 0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
            box-shadow: 0 18px 36px rgba(47, 143, 99, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .log {
            min-height: 44px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border: 1px solid rgba(47, 143, 99, 0.16);
            border-radius: 12px;
            color: var(--accent-dark);
            background: var(--accent-soft);
            font-size: 14px;
            line-height: 1.45;
        }

        .log::before {
            content: "";
            width: 9px;
            height: 9px;
            flex: 0 0 auto;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 5px rgba(47, 143, 99, 0.12);
        }

        .content {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(280px, auto);
            gap: 22px;
            padding: 24px;
            align-items: start;
        }

        .preview,
        .result {
            min-width: 0;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
        }

        canvas {
            width: 100%;
            max-width: 100%;
            display: none;
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #f7f7f2;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.75);
        }

        .empty-state {
            min-height: 184px;
            display: grid;
            place-items: center;
            padding: 24px;
            border: 1px dashed #c9d6ce;
            border-radius: 12px;
            color: var(--muted);
            background: var(--surface-soft);
            text-align: center;
            font-size: 14px;
        }

        .grid-container {
            display: grid;
            width: max-content;
            max-width: 100%;
            overflow: auto;
            gap: 3px;
            padding: 6px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #cad8d0;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.55);
        }

        .grid-container:empty {
            display: none;
        }

        .cell {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 8px;
            background: white;
            font-size: 21px;
            box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.08);
        }

        .cow {
            position: absolute;
            display: grid;
            place-items: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.72);
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.22));
        }

        @keyframes pop {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        @media (max-width: 760px) {
            body {
                padding: 18px 12px;
            }

            .hero {
                align-items: flex-start;
                flex-direction: column;
            }

            .top-panel,
            .content {
                grid-template-columns: 1fr;
            }

            .upload-area {
                min-height: 198px;
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .number-row {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

<main class="app">
    <header class="hero">
        <div>
            <h1>🐮 小牛逻辑拼图自动求解器</h1>
            <p class="subtitle">上传网格截图，核对行列数，然后一键标出小牛位置。</p>
        </div>
        <div class="badge">智能识别 · 本地计算</div>
    </header>

    <section class="tool" aria-label="小牛逻辑拼图求解器">
        <div class="top-panel">
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('upload').click()">
                <div>
                    <div class="upload-mark">＋</div>
                    <p class="upload-title">点击或拖拽上传游戏截图</p>
                    <p class="upload-hint">建议只截取棋盘区域，文件上传和粘贴截图是分开的。</p>
                    <input type="file" id="upload" accept="image/*" style="display:none">
                </div>
            </div>

            <div class="controls">
                <div class="number-row">
                    <label>行数
                        <input type="number" id="rows" value="10" min="1">
                    </label>
                    <label>列数
                        <input type="number" id="cols" value="10" min="1">
                    </label>
                </div>
                <button onclick="autoDetectAndSolve()">一键识别并求解</button>
                <div id="status" class="log">准备就绪。支持任意行列图片识别。</div>
            </div>
        </div>

        <div class="paste-panel">
            <div class="paste-area" id="pasteArea" tabindex="0" role="button" aria-label="粘贴截图区域">
                <div>
                    <div class="paste-mark">V</div>
                    <p class="paste-title">粘贴截图</p>
                    <p class="paste-hint">先点击这里，再按 Ctrl+V。这里不会影响文件上传入口。</p>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="preview">
                <div class="section-title">截图预览</div>
                <canvas id="canvas"></canvas>
                <div id="preview-empty" class="empty-state">上传图片后会在这里显示预览。</div>
            </div>

            <div class="result">
                <div class="section-title">求解结果</div>
                <div id="result-empty" class="empty-state">求解成功后会在这里生成棋盘。</div>
                <div id="result-grid" class="grid-container"></div>
            </div>
        </div>
    </section>
</main>

<script>
    const upload = document.getElementById('upload');
    const uploadArea = document.getElementById('uploadArea');
    const pasteArea = document.getElementById('pasteArea');
    const canvas = document.getElementById('canvas');
    const previewEmpty = document.getElementById('preview-empty');
    const resultEmpty = document.getElementById('result-empty');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    upload.onchange = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        loadImageFile(file);
    };

    uploadArea.addEventListener('dragover', (event) => {
        event.preventDefault();
        uploadArea.classList.add('dragging');
    });

    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragging');
    });

    uploadArea.addEventListener('drop', (event) => {
        event.preventDefault();
        uploadArea.classList.remove('dragging');
        const file = event.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            loadImageFile(file, 'upload');
        }
    });

    pasteArea.addEventListener('click', () => {
        pasteArea.focus();
    });

    pasteArea.addEventListener('focus', () => {
        pasteArea.classList.add('active');
    });

    pasteArea.addEventListener('blur', () => {
        pasteArea.classList.remove('active');
    });

    pasteArea.addEventListener('paste', (event) => {
        const clipboardData = event.clipboardData;
        if (!clipboardData) return;

        const imageFile = Array.from(clipboardData.items || [])
            .map(item => item.kind === 'file' ? item.getAsFile() : null)
            .find(file => file && file.type.startsWith('image/'));

        event.preventDefault();
        if (imageFile) {
            loadImageFile(imageFile, 'paste');
            return;
        }

        document.getElementById('status').innerText = "粘贴截图区域里没有检测到图片，请重新复制截图后再试。";
    });

    function loadImageFile(file, source = 'upload') {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                canvas.style.display = 'block';
                previewEmpty.style.display = 'none';
                resultEmpty.style.display = 'grid';
                document.getElementById('result-grid').innerHTML = '';
                document.getElementById('status').innerText =
                    source === 'paste'
                        ? "粘贴截图已加载，点击按钮开始自动识别。"
                        : "图片已加载，点击按钮开始自动识别。";

                // 自动执行一次检测逻辑
                detectGridSize();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    // 核心算法：自动检测网格行列
    function detectGridSize() {
        const width = canvas.width;
        const height = canvas.height;
        const imageData = ctx.getImageData(0, 0, width, height).data;

        const rowResult = detectAxisCells(false);
        const colResult = detectAxisCells(true);
        const rowsInput = document.getElementById('rows');
        const colsInput = document.getElementById('cols');
        const detectedRows = rowResult.cells || parseInt(rowsInput.value) || 10;
        const colChoice = chooseColumnCount(detectedRows, colResult, parseInt(colsInput.value) || 10);

        rowsInput.value = detectedRows;
        colsInput.value = colChoice.cells;

        const confidence = Math.round(Math.min(rowResult.confidence, colChoice.confidence) * 100);
        const confidenceText = confidence >= 70 ? "可信度较高" : "请重点核对";
        document.getElementById('status').innerText =
            `已自动识别为 ${detectedRows} 行 x ${colChoice.cells} 列（${confidenceText}，${confidence}%）。如不准确可手动修改。`;

        function chooseColumnCount(rows, detectedByLines, fallbackCols) {
            const squareCellCols = Math.max(1, Math.round(width / (height / rows)));
            const lineCols = detectedByLines.cells;
            const lineConfidence = detectedByLines.confidence;
            const lineMatchesRatio = lineCols && Math.abs(lineCols - squareCellCols) <= 1;

            if (lineCols && lineConfidence >= 0.72 && lineMatchesRatio) {
                return {
                    cells: lineCols,
                    confidence: lineConfidence
                };
            }

            return {
                cells: squareCellCols || lineCols || fallbackCols,
                confidence: lineCols ? Math.max(0.62, Math.min(0.88, lineConfidence)) : 0.68
            };
        }

        function detectAxisCells(isVerticalLine) {
            const axisLength = isVerticalLine ? width : height;
            const crossLength = isVerticalLine ? height : width;
            const scores = buildLineScores(isVerticalLine, axisLength, crossLength);
            const stats = getStats(scores.slice(1, -1));
            const threshold = stats.mean + stats.stdev * 0.85;
            const peaks = findPeakGroups(scores, threshold, axisLength);
            const peakCount = peaks.length;
            const maxCells = Math.min(30, Math.max(2, Math.floor(axisLength / 8)));
            let best = { cells: 0, score: 0 };

            for (let cells = 2; cells <= maxCells; cells++) {
                const internalLines = cells - 1;
                const tolerance = Math.max(2, Math.round((axisLength / cells) * 0.18));
                let matchedLines = 0;
                let totalStrength = 0;

                for (let line = 1; line < cells; line++) {
                    const expected = Math.round(axisLength * line / cells);
                    const localScore = getMaxAround(scores, expected, tolerance);
                    const normalized = (localScore - stats.mean) / stats.stdev;

                    if (localScore >= threshold) matchedLines++;
                    totalStrength += Math.max(0, normalized);
                }

                const matchRatio = matchedLines / internalLines;
                const strengthScore = Math.min(1, (totalStrength / internalLines) / 3);
                const countScore = peakCount
                    ? 1 - Math.min(1, Math.abs(internalLines - peakCount) / Math.max(internalLines, peakCount))
                    : 0;
                const score = matchRatio * 0.5 + strengthScore * 0.3 + countScore * 0.2;

                if (score > best.score) {
                    best = { cells, score };
                }
            }

            return {
                cells: best.score >= 0.36 ? best.cells : 0,
                confidence: Math.max(0, Math.min(1, best.score))
            };
        }

        function buildLineScores(isVerticalLine, axisLength, crossLength) {
            const scores = new Array(axisLength).fill(0);
            const crossStep = Math.max(1, Math.floor(crossLength / 90));

            for (let axis = 1; axis < axisLength - 1; axis++) {
                let total = 0;
                let samples = 0;

                for (let cross = Math.floor(crossStep / 2); cross < crossLength; cross += crossStep) {
                    const prev = getPixel(isVerticalLine, axis - 1, cross);
                    const next = getPixel(isVerticalLine, axis + 1, cross);
                    const current = getPixel(isVerticalLine, axis, cross);
                    const edge = pixelDistance(prev, next);
                    const darkLine = Math.max(0, (150 - getLuma(current)) / 150) * 70;

                    total += edge + darkLine;
                    samples++;
                }

                scores[axis] = total / samples;
            }

            return smoothScores(scores);
        }

        function getPixel(isVerticalLine, axis, cross) {
            const x = isVerticalLine ? axis : cross;
            const y = isVerticalLine ? cross : axis;
            const idx = (y * width + x) * 4;

            return [imageData[idx], imageData[idx + 1], imageData[idx + 2]];
        }

        function getLuma(pixel) {
            return pixel[0] * 0.299 + pixel[1] * 0.587 + pixel[2] * 0.114;
        }

        function pixelDistance(a, b) {
            return Math.sqrt(
                Math.pow(a[0] - b[0], 2) +
                Math.pow(a[1] - b[1], 2) +
                Math.pow(a[2] - b[2], 2)
            );
        }

        function smoothScores(scores) {
            return scores.map((score, index) => {
                let total = 0;
                let count = 0;

                for (let offset = -2; offset <= 2; offset++) {
                    const value = scores[index + offset];
                    if (value !== undefined) {
                        total += value;
                        count++;
                    }
                }

                return total / count;
            });
        }

        function getStats(values) {
            const mean = values.reduce((sum, value) => sum + value, 0) / values.length;
            const variance = values.reduce((sum, value) => sum + Math.pow(value - mean, 2), 0) / values.length;

            return {
                mean,
                stdev: Math.max(1, Math.sqrt(variance))
            };
        }

        function findPeakGroups(scores, threshold, axisLength) {
            const peaks = [];
            let active = null;
            const edgePadding = Math.max(2, Math.round(axisLength * 0.015));

            for (let i = edgePadding; i < scores.length - edgePadding; i++) {
                if (scores[i] >= threshold) {
                    if (!active) {
                        active = { start: i, end: i, max: scores[i], maxIndex: i };
                    } else {
                        active.end = i;
                        if (scores[i] > active.max) {
                            active.max = scores[i];
                            active.maxIndex = i;
                        }
                    }
                } else if (active) {
                    peaks.push(active);
                    active = null;
                }
            }

            if (active) peaks.push(active);

            return peaks.filter(peak => peak.end - peak.start <= Math.max(8, axisLength * 0.08));
        }

        function getMaxAround(scores, center, radius) {
            const start = Math.max(0, center - radius);
            const end = Math.min(scores.length - 1, center + radius);
            let max = 0;

            for (let i = start; i <= end; i++) {
                if (scores[i] > max) max = scores[i];
            }

            return max;
        }
    }

    async function autoDetectAndSolve() {
        const rows = parseInt(document.getElementById('rows').value);
        const cols = parseInt(document.getElementById('cols').value);
        const status = document.getElementById('status');

        if (!canvas.width || !canvas.height) {
            status.innerText = "请先上传游戏截图。";
            return;
        }

        if (!rows || !cols || rows < 1 || cols < 1) {
            status.innerText = "请填写有效的行数和列数。";
            return;
        }

        status.innerText = "正在分析颜色区域...";

        const cellW = canvas.width / cols;
        const cellH = canvas.height / rows;
        const gridData = [];
        const colorPalette = [];

        // 1. 区域采样
        for (let r = 0; r < rows; r++) {
            gridData[r] = [];
            for (let c = 0; c < cols; c++) {
                const centerX = c * cellW + cellW / 2;
                const centerY = r * cellH + cellH / 2;
                const p = ctx.getImageData(centerX, centerY, 1, 1).data;
                const rgb = `${p[0]},${p[1]},${p[2]}`;

                let rid = colorPalette.findIndex(item => colorDistance(item, rgb) < 30);
                if (rid === -1) {
                    colorPalette.push(rgb);
                    rid = colorPalette.length - 1;
                }
                gridData[r][c] = rid;
            }
        }

        status.innerText = `检测到 ${colorPalette.length} 个颜色区域。计算中...`;

        // 2. 求解
        const solver = new CowSolver(rows, cols, gridData);
        const start = performance.now();
        const result = solver.solve();
        const end = performance.now();

        if (result) {
            status.innerText = `求解成功！用时 ${(end - start).toFixed(2)}ms`;
            renderResult(rows, cols, gridData, result, colorPalette);
        } else {
            status.innerText = "未找到可行解。提示：请确保截图只包含网格部分，且行列数输入正确。";
        }
    }

    // 颜色相似度判断 (欧几里得距离)
    function colorDistance(c1, c2) {
        const a = c1.split(',').map(Number);
        const b = c2.split(',').map(Number);
        return Math.sqrt(Math.pow(a[0]-b[0],2) + Math.pow(a[1]-b[1],2) + Math.pow(a[2]-b[2],2));
    }

    class CowSolver {
        constructor(r, c, grid) {
            this.R = r; this.C = c; this.grid = grid;
            this.pos = new Array(r).fill(-1);
            this.usedCols = new Array(c).fill(false);
            this.usedRegs = new Set();
        }

        isValid(r, c) {
            if (this.usedCols[c]) return false;
            if (this.usedRegs.has(this.grid[r][c])) return false;
            for (let prevR = 0; prevR < r; prevR++) {
                if (Math.abs(prevR - r) <= 1 && Math.abs(this.pos[prevR] - c) <= 1) return false;
            }
            return true;
        }

        solve(r = 0) {
            if (r === this.R) return this.pos;
            for (let c = 0; c < this.C; c++) {
                if (this.isValid(r, c)) {
                    this.pos[r] = c;
                    this.usedCols[c] = true;
                    this.usedRegs.add(this.grid[r][c]);
                    if (this.solve(r + 1)) return this.pos;
                    this.usedRegs.delete(this.grid[r][c]);
                    this.usedCols[c] = false;
                }
            }
            return null;
        }
    }

    function renderResult(rows, cols, grid, solution, palette) {
        const container = document.getElementById('result-grid');
        container.innerHTML = '';
        container.style.gridTemplateColumns = `repeat(${cols}, 36px)`;
        resultEmpty.style.display = 'none';

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.backgroundColor = `rgb(${palette[grid[r][c]]})`;
                if (solution[r] === c) cell.innerHTML = '<span class="cow">🐮</span>';
                container.appendChild(cell);
            }
        }
    }
</script>
